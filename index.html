<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas - New way to Draw</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <h1>The future of drawing</h1>
    <div class="canvas-container">
        <canvas id="drawingCanvas"></canvas>
    </div>
    <button class="text-input" id="clearCanvas">Clear Canvas</button>
    <input type="color" id="colorPicker" class="color-input" />
    <input type="range" min="1" max="100" id="widthPicker" class="range-input" />
    <div>
    <select id="stampSelector" class="stamp-selector">
        <option value="circle">Circle</option>
        <option value="star">Star</option>
        <option value="heart">Heart</option>
    </select>
    <button id="stampTool" class="stamp-tool">Use Stamp</button>
</div>
    <script src="/canvas/script.js"></script>
</body>
</html>
