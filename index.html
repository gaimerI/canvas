<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Tokenizer</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1>Text Tokenizer</h1>
        <textarea id="inputText" placeholder="Enter your text here..." rows="5">variable "myVariable" is '0'</textarea>
        <button id="tokenizeButton">Tokenize Text</button>
        <h2>Tokenized Output</h2>
        <pre id="output"></pre>
    </div>
    <script src="script.js"></script>
</body>
</html>
